<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twibbon Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="panel">
<h2>Twibbon Generator</h2>
<input type="text" id="nama" placeholder="Masukkan Nama">
<input type="file" id="foto" accept="image/*">
<label>Zoom Foto</label>
<input type="range" id="zoom" min="0.5" max="3" step="0.01" value="1">
<button onclick="downloadTwibbon()">Download PNG</button>
<p>Letakkan file <b>frame.png</b> pada folder yang sama.</p>
</div>
<canvas id="canvas" width="1080" height="1080"></canvas>
</div>
<script src="script.js"></script>
</body>
</html>
