<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Twibbon MPLS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"></head><body>
<div class="wrap">
<div class="panel">
<h2>Twibbon MPLS SMPN 4 Amlapura</h2>
<input id="nama" type="text" placeholder="Masukkan Nama">
<input id="foto" type="file" accept="image/*">
<label>Zoom Foto</label>
<input id="zoom" type="range" min="0.5" max="3" step="0.01" value="1">
<button onclick="downloadPNG()">Download PNG</button>
<p>Geser foto langsung pada preview.</p>
</div>
<canvas id="canvas" width="1080" height="1080"></canvas>
</div>
<script src="script.js"></script>
</body></html>
